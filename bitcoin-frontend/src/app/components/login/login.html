<div class="login-container">
  <div class="login-card">

    <!-- STEP 1: Username + Password -->
    <div *ngIf="step === 'credentials'">
      <div class="login-header">
        <div class="btc-logo">₿</div>
        <h1>Bitcoin TestNet</h1>
        <p>Sign in to your account</p>
      </div>

      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          [(ngModel)]="username"
          placeholder="Enter your username"
          [disabled]="isLoading"
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          placeholder="••••••••"
          [disabled]="isLoading"
          (keyup.enter)="login()"
        />
      </div>

      <button class="btn-primary" (click)="login()" [disabled]="isLoading">
        {{ isLoading ? 'Signing in...' : 'Sign in' }}
      </button>

      <button class="btn-secondary" (click)="goToRegister()" [disabled]="isLoading">
        Don't have an account? Register
      </button>
    </div>

    <!-- STEP 2: TOTP Code -->
    <div *ngIf="step === 'totp'">
      <div class="login-header">
        <div class="btc-logo">🔐</div>
        <h1>Two-Factor Authentication</h1>
        <p>Enter the 6-digit code from your Google Authenticator app</p>
      </div>

      <div class="totp-info">
        <p>Signing in as <strong>{{ username }}</strong></p>
      </div>

      <div class="form-group">
        <label>Authentication Code</label>
        <input
          type="text"
          [(ngModel)]="totpCode"
          placeholder="000000"
          maxlength="6"
          [disabled]="isLoading"
          (keyup.enter)="verifyTotp()"
          autofocus
        />
      </div>

      <button class="btn-primary" (click)="verifyTotp()" [disabled]="isLoading">
        {{ isLoading ? 'Verifying...' : 'Verify' }}
      </button>

      <button class="btn-back" (click)="backToCredentials()" [disabled]="isLoading">
        ← Back to login
      </button>
    </div>

    <p class="error-msg" *ngIf="message">{{ message }}</p>

  </div>
</div>
