<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="btc-logo">₿</div>
      <h1>Bitcoin TestNet</h1>
      <p>Connectez-vous à votre compte</p>
    </div>

    <div class="form-group">
      <label>Nom d'utilisateur</label>
      <input type="text" [(ngModel)]="username" placeholder="Entrez votre nom" />
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" />
    </div>

    
    <button class="btn-primary" (click)="login()">Se connecter</button>
    <button class="btn-secondary" (click)="register()">S'inscrire</button>

    <p class="error-msg" *ngIf="message">{{ message }}</p>

  </div>
</div>
