<div class="wallet-container">
  <div class="topbar">
    <div class="topbar-left">
      <div class="btc-icon">₿</div>
      <span class="brand">Transactions & Signatures</span>
    </div>
    <button class="btn-back" (click)="goBack()">Retour</button>
  </div>

  <div class="main-content">
    <div class="grid-2">

      <div class="panel">
        <div class="panel-title">Envoyer une transaction</div>
        <div class="form-group">
          <label>Adresse source</label>
          <input type="text" [(ngModel)]="fromAddress" placeholder="Adresse source" />
        </div>
        <div class="form-group">
          <label>Adresse destination</label>
          <input type="text" [(ngModel)]="toAddress" placeholder="Adresse destination" />
        </div>
        <div class="form-group">
          <label>Montant (satoshis)</label>
          <input type="number" [(ngModel)]="amount" placeholder="0" />
        </div>
        <button class="btn-primary" (click)="sendTransaction()">Envoyer</button>

        <div *ngIf="txResult" class="result-box">
          <div class="result-row">
            <span class="result-label">Status</span>
            <span class="status-badge">{{ txResult.status }}</span>
          </div>
          <div class="result-row">
            <span class="result-label">Montant</span>
            <span class="result-value">{{ txResult.amount }} satoshis</span>
          </div>
        </div>

        <p *ngIf="message" class="success-msg">{{ message }}</p>
      </div>

      <div class="panel">
        <div class="panel-title">Signer un message</div>
        <div class="form-group">
          <label>Adresse</label>
          <input type="text" [(ngModel)]="fromAddress" placeholder="Adresse du wallet" />
        </div>
        <div class="form-group">
          <label>Message</label>
          <input type="text" [(ngModel)]="messageText" placeholder="Message à signer" />
        </div>
        <button class="btn-primary" (click)="signMessage()">Signer</button>

        <div *ngIf="signature" class="result-box">
          <div class="result-label">Signature</div>
          <div class="signature-value">{{ signature }}</div>
        </div>
      </div>

    </div>
  </div>
</div>
